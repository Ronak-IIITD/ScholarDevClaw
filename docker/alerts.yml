groups:
  - name: scholardevclaw-slo
    interval: 30s
    rules:
      - alert: ScholarDevClawHighErrorRate
        expr: |
          (
            sum(rate(scholardevclaw_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(scholardevclaw_http_requests_total[5m])), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: page
          service: scholardevclaw-core
        annotations:
          summary: "High 5xx error rate on core API"
          description: "5xx responses exceeded 5% over 10 minutes."

      - alert: ScholarDevClawHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(scholardevclaw_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 2.0
        for: 15m
        labels:
          severity: warning
          service: scholardevclaw-core
        annotations:
          summary: "High API latency p95"
          description: "p95 latency exceeded 2s for 15 minutes."

      - alert: ScholarDevClawCoreDown
        expr: up{job="scholardevclaw-core"} == 0
        for: 5m
        labels:
          severity: page
          service: scholardevclaw-core
        annotations:
          summary: "Core API target down"
          description: "Prometheus cannot scrape core-api for more than 5 minutes."
