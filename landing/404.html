<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | ScholarDevClaw</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050810; --surface: #0d1424; --border: #1e2d4a;
      --text: #e2e8f0; --muted: #64748b; --cyan: #00e5cc;
      --font-sans: 'Space Grotesk', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .box {
      text-align: center;
      max-width: 480px;
    }
    .code {
      font-family: var(--font-mono);
      font-size: 6rem;
      font-weight: 700;
      color: var(--cyan);
      opacity: 0.15;
      line-height: 1;
      margin-bottom: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    p { color: var(--muted); font-size: 0.95rem; margin-bottom: 32px; line-height: 1.6; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; background: var(--cyan); color: var(--bg);
      font-weight: 700; font-size: 0.9rem; border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #00c8b4; text-decoration: none; }
    a svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist or has been moved. The install script and docs may be at the root.</p>
    <a href="./">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Back to ScholarDevClaw
    </a>
  </div>
</body>
</html>
