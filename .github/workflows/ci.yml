name: CI

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "agent/**"
      - "docker/**"
      - "docs/**"
      - "landing/**"
      - "Makefile"
      - "web/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "core/**"
      - "agent/**"
      - "docker/**"
      - "docs/**"
      - "landing/**"
      - "Makefile"
      - "web/**"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Python Core — lint, type-check, test, coverage
  # ──────────────────────────────────────────────
  python-lint:
    name: "Python Lint (Ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core/pyproject.toml
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  python-typecheck:
    name: "Python Type Check (Mypy)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: mypy src/scholardevclaw/cli.py src/scholardevclaw/api/server.py src/scholardevclaw/application/pipeline.py --ignore-missing-imports --follow-imports=skip --disable-error-code no-any-return

  python-test:
    name: "Python Tests (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: core/pyproject.toml
      - run: pip install -e ".[dev,product]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -x -q \
            --tb=short \
            --cov=scholardevclaw \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=40
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: core/coverage.xml

  python-demo-integration:
    name: "Python Demo Integration"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core/pyproject.toml
      - run: pip install -e ".[dev,product]"
      - name: Run end-to-end demo smoke
        run: |
          python -m scholardevclaw.cli demo --spec rmsnorm --skip-validate --output-json > /tmp/sdc-demo.json
          python - <<'PY'
          import json
          from pathlib import Path
          text = Path("/tmp/sdc-demo.json").read_text()
          decoder = json.JSONDecoder()
          payload = None
          for idx, ch in enumerate(text):
              if ch != "{":
                  continue
              try:
                  candidate, end = decoder.raw_decode(text[idx:])
              except json.JSONDecodeError:
                  continue
              if text[idx + end :].strip():
                  continue
              payload = candidate
              break
          assert payload is not None, "demo did not emit a trailing JSON payload"
           assert payload["specs"], "demo produced no results"
           assert payload["specs"][0]["spec"] == "rmsnorm"
          PY

  benchmark-regression:
    name: "Benchmark Regression Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core/pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Run benchmark harness
        run: python -m benchmarks.runner --output /tmp/benchmark_report.json
      - name: Enforce benchmark floor
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          baseline = json.loads(Path("benchmarks/benchmark_report.json").read_text())
          current = json.loads(Path("/tmp/benchmark_report.json").read_text())
          baseline_score = float(baseline["aggregate"]["aggregate_score"])
          current_score = float(current["aggregate"]["aggregate_score"])
          if current_score < baseline_score - 0.1:
              raise SystemExit(
                  f"Benchmark regression too large: baseline={baseline_score:.3f}, current={current_score:.3f}"
              )
          print(f"Benchmark gate passed: baseline={baseline_score:.3f}, current={current_score:.3f}")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: /tmp/benchmark_report.json

  # ──────────────────────────────────────────────
  # TypeScript Agent — lint, build, typecheck, test
  # ──────────────────────────────────────────────
  agent-build:
    name: "Agent Build + Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun tsc --noEmit
      - run: bun run test

  # ──────────────────────────────────────────────
  # Docker build smoke test
  # ──────────────────────────────────────────────
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.core
          load: true
          tags: scholardevclaw-core:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.agent
          load: true
          tags: scholardevclaw-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs-lint:
    name: "Docs Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/docs_lint.py

  # ──────────────────────────────────────────────
  # Quality gate — all checks must pass
  # ──────────────────────────────────────────────
  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    needs:
      [
        python-lint,
        python-typecheck,
        python-test,
        python-demo-integration,
        benchmark-regression,
        agent-build,
        docker-build,
        docs-lint,
      ]
    steps:
      - run: echo "All checks passed"
