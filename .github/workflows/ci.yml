name: CI

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "agent/**"
      - "docker/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/**"
      - "agent/**"
      - "docker/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Python Core — lint, type-check, test, coverage
  # ──────────────────────────────────────────────
  python-lint:
    name: "Python Lint (Ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core/pyproject.toml
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  python-typecheck:
    name: "Python Type Check (Mypy)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: mypy src/scholardevclaw/ --ignore-missing-imports

  python-test:
    name: "Python Tests (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: core/pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -x -q \
            --tb=short \
            --cov=scholardevclaw \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: core/coverage.xml

  # ──────────────────────────────────────────────
  # TypeScript Agent — lint, build, typecheck, test
  # ──────────────────────────────────────────────
  agent-build:
    name: "Agent Build + Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
          cache-dependency-glob: "**/bun.lock"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun tsc --noEmit
      - run: bun run test

  # ──────────────────────────────────────────────
  # Docker build smoke test
  # ──────────────────────────────────────────────
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.core
          load: true
          tags: scholardevclaw-core:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.agent
          load: true
          tags: scholardevclaw-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Quality gate — all checks must pass
  # ──────────────────────────────────────────────
  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    needs: [python-lint, python-typecheck, python-test, agent-build, docker-build]
    steps:
      - run: echo "All checks passed"
