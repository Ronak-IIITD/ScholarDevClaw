name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Python Core — lint, type-check, test, coverage
  # ──────────────────────────────────────────────
  python-lint:
    name: "Python Lint (Ruff)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  python-typecheck:
    name: "Python Type Check (Mypy)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy src/scholardevclaw/ --ignore-missing-imports --no-error-summary || true

  python-test:
    name: "Python Tests (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -x -q \
            --tb=short \
            --cov=scholardevclaw \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: core/coverage.xml

  # ──────────────────────────────────────────────
  # TypeScript Agent — lint, build, test
  # ──────────────────────────────────────────────
  agent-build:
    name: "Agent Build + Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test

  # ──────────────────────────────────────────────
  # Docker build smoke test
  # ──────────────────────────────────────────────
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build core image
        run: docker build -f docker/Dockerfile.core -t scholardevclaw-core:ci .
      - name: Build agent image
        run: docker build -f docker/Dockerfile.agent -t scholardevclaw-agent:ci .

  # ──────────────────────────────────────────────
  # Quality gate — all checks must pass
  # ──────────────────────────────────────────────
  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    needs: [python-lint, python-test, agent-build, docker-build]
    steps:
      - run: echo "All checks passed"
