name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # Validate the tag matches pyproject.toml version
  # ──────────────────────────────────────────────
  validate:
    name: "Validate Release"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(python -c "
          import re
          with open('core/pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"([^\"]+)\"', f.read())
              print(m.group(1) if m else '')
          ")
          echo "Tag version: $TAG"
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: Tag v$TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Run full test suite before release
  # ──────────────────────────────────────────────
  test:
    name: "Release Tests"
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -x -q

  # ──────────────────────────────────────────────
  # Build and publish to PyPI
  # ──────────────────────────────────────────────
  publish-pypi:
    name: "Publish to PyPI"
    needs: [validate, test]
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # ──────────────────────────────────────────────
  # Create GitHub Release with changelog
  # ──────────────────────────────────────────────
  github-release:
    name: "GitHub Release"
    needs: [validate, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          python3 -c "
          import re, sys
          with open('CHANGELOG.md') as f:
              content = f.read()
          pattern = rf'## \[{re.escape(\"$VERSION\")}\].*?\n(.*?)(?=\n## \[|$)'
          m = re.search(pattern, content, re.DOTALL)
          if m:
              print(m.group(1).strip())
          else:
              print('Release v$VERSION')
          " > release_notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: true

  # ──────────────────────────────────────────────
  # Build and push Docker images
  # ──────────────────────────────────────────────
  docker-publish:
    name: "Docker Publish"
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push core
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile.core
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/core:${{ needs.validate.outputs.version }}
            ghcr.io/${{ github.repository }}/core:latest
      - name: Build and push agent
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile.agent
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/agent:${{ needs.validate.outputs.version }}
            ghcr.io/${{ github.repository }}/agent:latest
