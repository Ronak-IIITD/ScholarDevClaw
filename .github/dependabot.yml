version: 2
updates:
  - package-ecosystem: pip
    directory: /core
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      python-packages:
        patterns:
          - "*"
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: cryptography
        update-types: [version-update:semver-major]

  - package-ecosystem: bun
    directory: /agent
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /.github/workflows
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(gha)"
