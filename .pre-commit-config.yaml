repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: scholardevclaw-mypy
        name: scholardevclaw-mypy
        entry: bash -lc 'cd core && python3 -m mypy --strict src/scholardevclaw/exceptions.py tests/unit/test_phase0_foundation.py'
        language: system
        pass_filenames: false
      - id: scholardevclaw-pytest
        name: scholardevclaw-pytest
        entry: bash -lc 'cd core && python3 -m pytest tests/unit/test_phase0_foundation.py tests/test_ingestion.py tests/test_execution.py -q'
        language: system
        pass_filenames: false
