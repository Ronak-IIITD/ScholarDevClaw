repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: scholardevclaw-mypy
        name: scholardevclaw-mypy
        entry: bash -lc 'cd core && python3 -m mypy src/scholardevclaw/cli.py src/scholardevclaw/api/server.py src/scholardevclaw/application/pipeline.py src/scholardevclaw/utils/config.py src/scholardevclaw/utils/validation.py --ignore-missing-imports --follow-imports=skip --disable-error-code no-any-return'
        language: system
        pass_filenames: false
      - id: scholardevclaw-pytest
        name: scholardevclaw-pytest
        entry: bash -lc 'cd core && python3 -m pytest tests/unit/test_config.py tests/unit/test_logger.py tests/unit/test_atomic_write.py tests/unit/test_validation_utils.py tests/unit/test_phase0_foundation.py -q'
        language: system
        pass_filenames: false
