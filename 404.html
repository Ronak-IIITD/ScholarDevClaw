<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — ScholarDevClaw</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    :root {
      --bg: #09090b;
      --text: #fafafa;
      --muted: #a1a1aa;
      --accent: #22d3ee;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    h1 {
      font-size: 120px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--accent);
      line-height: 1;
    }
    p {
      font-size: 18px;
      color: var(--muted);
      margin: 16px 0 32px;
    }
    a {
      color: var(--text);
      text-decoration: none;
      padding: 12px 24px;
      background: var(--accent);
      color: #09090b;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: opacity 0.15s;
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Page not found</p>
  <a href="./">Go home</a>
</body>
</html>
